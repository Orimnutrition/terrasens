<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3436;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e272e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1BA8A6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#158a88;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E6A817;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4991a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="512" cy="512" r="480" fill="url(#bg)" />
  <circle cx="512" cy="512" r="470" fill="none" stroke="#1BA8A6" stroke-width="4" opacity="0.6" />

  <!-- Leaf / Agriculture symbol -->
  <g transform="translate(512, 280)">
    <!-- Main leaf -->
    <path d="M0,-80 C60,-60 100,10 80,80 C60,60 20,40 0,20 C-20,40 -60,60 -80,80 C-100,10 -60,-60 0,-80 Z"
          fill="url(#tealGrad)" opacity="0.9" />
    <!-- Leaf vein -->
    <line x1="0" y1="-60" x2="0" y2="60" stroke="#2D3436" stroke-width="3" opacity="0.4" />
    <line x1="0" y1="-20" x2="30" y2="10" stroke="#2D3436" stroke-width="2" opacity="0.3" />
    <line x1="0" y1="-20" x2="-30" y2="10" stroke="#2D3436" stroke-width="2" opacity="0.3" />
    <line x1="0" y1="10" x2="20" y2="35" stroke="#2D3436" stroke-width="2" opacity="0.3" />
    <line x1="0" y1="10" x2="-20" y2="35" stroke="#2D3436" stroke-width="2" opacity="0.3" />
  </g>

  <!-- DNA helix (ORIM identity) -->
  <g transform="translate(512, 280)" opacity="0.5">
    <path d="M-15,-70 C-15,-40 15,-20 15,10 C15,40 -15,60 -15,80"
          fill="none" stroke="#E6A817" stroke-width="3" />
    <path d="M15,-70 C15,-40 -15,-20 -15,10 C-15,40 15,60 15,80"
          fill="none" stroke="#E6A817" stroke-width="3" />
    <!-- Rungs -->
    <line x1="-12" y1="-55" x2="12" y2="-55" stroke="#E6A817" stroke-width="2" />
    <line x1="-8" y1="-25" x2="8" y2="-25" stroke="#E6A817" stroke-width="2" />
    <line x1="-8" y1="5" x2="8" y2="5" stroke="#E6A817" stroke-width="2" />
    <line x1="-12" y1="35" x2="12" y2="35" stroke="#E6A817" stroke-width="2" />
    <line x1="-12" y1="65" x2="12" y2="65" stroke="#E6A817" stroke-width="2" />
  </g>

  <!-- AGRORIM text -->
  <text x="512" y="480" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="120" font-weight="bold" letter-spacing="12" fill="white">
    AGRORIM
  </text>

  <!-- TM symbol -->
  <text x="870" y="440" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="32" fill="#E6A817">
    TM
  </text>

  <!-- Divider line -->
  <line x1="262" y1="510" x2="762" y2="510" stroke="#1BA8A6" stroke-width="3" opacity="0.7" />

  <!-- Tagline -->
  <text x="512" y="560" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="36" fill="#1BA8A6" letter-spacing="6" opacity="0.9">
    IA AGRONOMIQUE
  </text>
  <text x="512" y="605" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="28" fill="#E6A817" letter-spacing="4" opacity="0.8">
    SOUVERAINE
  </text>

  <!-- 8 module dots around bottom -->
  <g transform="translate(512, 720)">
    <!-- M1-M8 circles -->
    <circle cx="-175" cy="0" r="18" fill="#1BA8A6" opacity="0.8" />
    <circle cx="-125" cy="0" r="18" fill="#1BA8A6" opacity="0.75" />
    <circle cx="-75" cy="0" r="18" fill="#1BA8A6" opacity="0.7" />
    <circle cx="-25" cy="0" r="18" fill="#1BA8A6" opacity="0.65" />
    <circle cx="25" cy="0" r="18" fill="#E6A817" opacity="0.65" />
    <circle cx="75" cy="0" r="18" fill="#E6A817" opacity="0.7" />
    <circle cx="125" cy="0" r="18" fill="#E6A817" opacity="0.75" />
    <circle cx="175" cy="0" r="18" fill="#E6A817" opacity="0.8" />
    <!-- Module numbers -->
    <text x="-175" y="6" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">1</text>
    <text x="-125" y="6" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">2</text>
    <text x="-75" y="6" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">3</text>
    <text x="-25" y="6" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">4</text>
    <text x="25" y="6" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#2D3436">5</text>
    <text x="75" y="6" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#2D3436">6</text>
    <text x="125" y="6" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#2D3436">7</text>
    <text x="175" y="6" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#2D3436">8</text>
  </g>

  <!-- Local-first badge -->
  <g transform="translate(512, 800)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial" font-size="20"
          fill="white" letter-spacing="8" opacity="0.5">
      LOCAL-FIRST . ZERO CLOUD
    </text>
  </g>

  <!-- Outer ring accent -->
  <circle cx="512" cy="512" r="495" fill="none" stroke="#E6A817" stroke-width="2" opacity="0.3"
          stroke-dasharray="8,12" />
</svg>
